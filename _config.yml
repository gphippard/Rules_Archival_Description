title: "Community RAD"
description: "Test site for Community RAD"
url: "https://gphippard.github.io"
baseurl: "/Rules_Archival_Description"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-include-cache
  - jekyll-relative-links

collections:
  rad:
    output: true
    permalink: /RAD/:path/
  pages:
    output: true
    permalink: /:name/
  revisions:
    output: true
    permalink: /:name/

defaults:
  - scope:
      path: ""
      type: rad
    values:
      layout: single
      
  - scope:
      path: ""
    values:
      sidebar:
        nav: "main-sidebar"
      sidebar_position: left
      comments: true
      
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single 
      sitemap: true

relative_links:
  enabled: true
  collections: false

navigation: true
search: true
search_full_content: true
atom_feed: 
  hide: true
recent_posts:
  hide: true

header:
  sticky: true

markdown: kramdown
highlighter: rouge
