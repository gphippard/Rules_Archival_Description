title: "Community Rules for Archival Description (RAD)"
description: "An archivist led site for applying and revising RAD"
url: "https://gphippard.github.io"
baseurl: "/Rules_Archival_Description"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-include-cache
  - jekyll-relative-links

defaults:
  - scope:
      path: "RAD"
    values:
      layout: single
      permalink: /RAD/:basename/

relative_links:
  enabled: true
  collections: false

navigation: true
search: true
search_full_content: true

markdown: kramdown
highlighter: rouge
